<div class="page">
  <div class="card" role="region" aria-label="LeaseVault create account">
    <header class="header">
      <div class="brand">
        <h1>LeaseVault</h1>
        <p class="subtitle">Create your account to start saving summaries.</p>
      </div>
    </header>

    <p *ngIf="error" class="error" role="alert">{{ error }}</p>

    <form class="form" (ngSubmit)="createAccountEmail()" autocomplete="on">
      <label class="label">
        Email
        <input
          class="input"
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="you@example.com"
          required
          [disabled]="loading"
          autocomplete="email"
        />
      </label>

      <label class="label">
        Password
        <div class="passwordRow">
          <input
            class="input"
            [type]="showPassword ? 'text' : 'password'"
            name="password"
            [(ngModel)]="password"
            placeholder="Create a password"
            required
            minlength="6"
            [disabled]="loading"
            autocomplete="new-password"
          />

          <button
            class="iconBtn"
            type="button"
            (click)="toggleShowPassword()"
            [disabled]="loading"
            [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
            [attr.title]="showPassword ? 'Hide password' : 'Show password'"
          >
            {{ showPassword ? 'Hide' : 'Show' }}
          </button>
        </div>
      </label>

      <button class="btn primary" type="submit" [disabled]="loading">
        {{ loading ? 'Creating…' : 'Create account' }}
      </button>
    </form>

    <p class="switch">
      Already have an account?
      <a class="link" [routerLink]="['/login']">Sign in</a>
    </p>
  </div>
</div>
